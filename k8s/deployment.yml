apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: api-ia-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: api-ia-web-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_R2DBC_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: db-url
            - name: SPRING_R2DBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: db-username
            - name: SPRING_R2DBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: db-password
            - name: API_OPENROUTER_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: openrouter-url
            - name: API_OPENROUTER_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: openrouter-key
            - name: API_OPENROUTER_MODEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: openrouter-model
            - name: API_MISTRAL_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: mistral-url
            - name: API_MISTRAL_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: mistral-key
            - name: API_MISTRAL_MODEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: mistral-model
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: api-ia-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: api-ia-web-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: api-base-url
